spring.profiles.active=local

# MySQL 연결
spring.datasource.url=jdbc:mysql://localhost:3306/culture_wanderers?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=appuser
spring.datasource.password=1234

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=false

# Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com

# Korea Tourism Organization TourAPI
# 공공데이터포털에서 한국관광공사 국문 관광정보 서비스 키를 발급받아 설정하세요.
tourapi.enabled=${TOUR_API_ENABLED:true}
tourapi.service-key=${TOUR_API_SERVICE_KEY:${SERVICE_KEY:}}

# 경기데이터드림 관광지코스 목록 API
# 상세 페이지에서 Open API 서비스명 또는 요청 URL을 확인해 설정하세요.
gyeonggi-data.enabled=${GYEONGGI_DATA_ENABLED:true}
gyeonggi-data.api-key=${GYEONGGI_DATA_KEY:}
gyeonggi-data.endpoint=${GYEONGGI_DATA_ENDPOINT:}
gyeonggi-data.service-name=${GYEONGGI_DATA_SERVICE_NAME:TB25BPTTOURCRSM}

# 문화공공데이터광장 한국문화정보원_전국 연극장 및 소극장 정보
culture-data.enabled=${CULTURE_DATA_ENABLED:true}
culture-data.api-key=${CULTURE_DATA_API_KEY:}
culture-data.endpoint=${CULTURE_DATA_ENDPOINT:https://api.kcisa.kr/openapi/API_TOU_053/request}

# KOPIS 공연예술통합전산망 공연목록 API
kopis.enabled=${KOPIS_API_ENABLED:true}
kopis.api-key=${KOPIS_API_KEY:}
kopis.endpoint=${KOPIS_API_ENDPOINT:http://www.kopis.or.kr/openApi/restful/pblprfr}
